image: "rust:1.84"

variables:
  CARGO_HOME: $CI_PROJECT_DIR/cargo
  GIT_SUBMODULE_STRATEGY: normal

prepare:lockfile:
  stage: .pre
  image: "rust:1"
  script:
    - CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS=fallback cargo generate-lockfile
  artifacts:
    paths:
      - Cargo.lock

windows-api_gen:x86_64-unknown-linux-gnu:
  before_script:
    - rustup component add rustfmt
  script:
    - cd gilrs-core && cargo r -p api_gen
    # Only detect changes to tracked files in the gilrs-core (current) directory:
    - test -z "$(git status --porcelain .)" || (echo "::error::Generated files are different, please regenerate with cargo run -p api_gen!"; git status; false)

test:x86_64-unknown-linux-gnu:
  stage: test
  before_script:
    - apt-get update -yqq && apt-get install -yqq libudev-dev
    # eframe dependencies for testing gui example
    - apt-get install -yqq libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libspeechd-dev libxkbcommon-dev libssl-dev
    - rustc -Vv && cargo -Vv
  script:
    - cargo test --verbose --all --features serde-serialize --exclude api_gen

test:i686-unknown-linux-gnu:
  stage: test
  variables:
    PKG_CONFIG_ALLOW_CROSS: "1"
  before_script:
    - dpkg --add-architecture i386
    - apt-get update -yqq && apt-get install -yqq gcc-multilib libudev-dev libudev1:i386 libudev-dev:i386
    - rustc -Vv && cargo -Vv
    - rustup target add i686-unknown-linux-gnu
  script:
    - cargo test --verbose --target=i686-unknown-linux-gnu --lib --features serde-serialize

build:wasm32-unknown-unknown:
  stage: test
  before_script:
    - rustc -Vv && cargo -Vv
    - rustup target add wasm32-unknown-unknown
  script:
    - cargo test --no-run --target wasm32-unknown-unknown --all --features serde-serialize --exclude api_gen

check:x86_64-apple-darwin:
  stage: test
  before_script:
    - rustc -Vv && cargo -Vv
    - rustup target add x86_64-apple-darwin
  script:
    - cargo check --target=x86_64-apple-darwin --verbose --all --features serde-serialize --exclude api_gen
